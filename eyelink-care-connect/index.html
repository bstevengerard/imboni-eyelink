    <meta property="og:title" content="Imboni EyeLink">

    <meta name="twitter:title" content="Imboni EyeLink">
    <meta name="twitter:description" content="Imboni EyeLink Project">

</head>

  <body>
    <script>
      // Force light mode by default - remove any system dark mode preference
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        localStorage.theme = 'light';
      }
      document.documentElement.classList.remove('dark');
    </script>
    <script>
      // Filter out Chrome extension errors
      const originalError = console.error;
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && 
            (args[0].includes('all-frames.js') || 
             args[0].includes('content-all.js') || 
             args[0].includes('Receiving end does not exist') ||
             args[0].includes('play() request was interrupted'))) {
          return; // Suppress extension errors
        }
        originalError.apply(console, args);
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
